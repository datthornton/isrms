[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "isrms-monte-carlo-simulations"
version = "0.1.0"
description = "IRMS Monte Carlo Simulation Models for Security Risk Analysis"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    "openpyxl>=3.1.0",
    "matplotlib>=3.7.0",
    "scipy>=1.10.0",
]
